<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Neked ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    color: white;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.15);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

h1 {
    font-size: 2.5em;
}

.heart {
    font-size: 3em;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="card">
    <div class="heart">❤️</div>
    <h1>Boldog születésnapot!</h1>
    <p>Te vagy a legfontosabb számomra 💕</p>
    <p>Szeretlek! 💖</p>
</div>

</body>
</html>
